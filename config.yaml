# Tower monitoring pipeline — static site configuration.
# Load this file via config.py, which validates and exposes every value as a
# module-level attribute. Edit here; never import this file directly.

# ---------------------------------------------------------------------------
# File-system roots
# ---------------------------------------------------------------------------
paths:
  file_root: '/home/womo1998/Projects/grkgeyer/'
  slice_root: '/home/womo1998/Projects/grkgeyer/tower_scratch_data/'
  db_root: '/home/womo1998/Projects/grkgeyer/analysis/result_db/'
  modal_conf_dir: '/home/womo1998/Projects/grkgeyer/analysis/modal_source_files/'

# ---------------------------------------------------------------------------
# Quantity → data-origin / sub-directory mapping
# ---------------------------------------------------------------------------
origins:
  accel:           accel
  wind:            wind
  temp:            temp
  strain_rosettes: strain
  strain_bolts:    strain

subpaths:
  accel:  towerdata
  wind:   towerdata
  temp:   towerdata
  strain: strain_data

# Earliest available data date per origin (ISO 8601 date strings)
dtstarts:
  accel:  '2015-05-20'
  wind:   '2015-05-20'
  temp:   '2015-05-20'
  strain: '2016-12-16'

# ---------------------------------------------------------------------------
# Channel definitions
# ---------------------------------------------------------------------------
channels:
  all:
    accel:
      - Accel_01
      - Accel_02
    wind:
      - Wr
      - Wg
    strain_rosettes:
      - A_Temp
      - B_Temp
      - C_Temp
      - D_Temp_1
      - D_Temp_2
      - D_Temp_3
      - A_z
      - A_t
      - A_zt
      - B_z
      - B_t
      - B_zt
      - C_z
      - C_t
      - C_zt
      - D_z
      - D_t
      - D_zt
    strain_bolts:
      - 10_Temp
      - 10_z1
      - 10_z2
      - 8_z1
      - 8_z2
      - 8_z3
      - 9_z1
      - 9_z2
      - 9_z3
    temp:
      - Pt100_01
      - Pt100_02
      - Pt100_03
      - Pt100_04
      - Pt100_05

  optional:
    accel:
      - Accel_01_top
      - Accel_02_top
      - Accel_03_top
      - Accel_04_top
      - Accel_03
      - Accel_04
      - Accel_05
      - Accel_06
      - Accel_07
      - Accel_08
    wind:
      - Wr_top
      - Wg_top

  # Flat lists used by strain-processing helpers
  strain_list:
    - A_z
    - A_t
    - A_zt
    - B_z
    - B_t
    - B_zt
    - C_z
    - C_t
    - C_zt
    - D_z
    - D_t
    - D_zt
    - 10_z1
    - 10_z2
    - 8_z1
    - 8_z2
    - 8_z3
    - 9_z1
    - 9_z2
    - 9_z3

  temp_list:
    - 10_Temp
    - D_Temp_1
    - D_Temp_2
    - D_Temp_3
    - C_Temp
    - B_Temp
    - A_Temp

