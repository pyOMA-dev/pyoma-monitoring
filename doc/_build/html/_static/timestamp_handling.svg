<svg width="680" height="470" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img">
<title>Timestamp handling in the monitoring pipeline</title>
<desc>Four horizontal layers showing how timestamps flow from naive device-local time, through a single TimeConvention boundary, into the canonical on-disk storage format, then back out to all consumers.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Device layer (gray) -->
<rect x="40" y="36" width="600" height="58" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Device layer — naive local time</text>
<text x="340" y="78" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">Q.Station &amp; Labview file timestamps, file mtimes; drifting clocks, no consistent tz</text>

<line x1="340" y1="94" x2="340" y2="124" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- TimeConvention boundary (blue) -->
<rect x="40" y="126" width="600" height="74" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="148" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">TimeConvention — the single conversion boundary</text>
<text x="340" y="168" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">vectorised; owns Europe/Berlin ↔ UTC, DST gaps, rrule index, duration units</text>
<text x="340" y="184" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">to_storage_coord · to_local · posix_to_datetime64 · make_index · gap_lengths</text>

<line x1="200" y1="200" x2="200" y2="238" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="480" y1="200" x2="480" y2="238" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Storage: time coord (amber) -->
<rect x="40" y="240" width="290" height="78" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="185" y="262" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">time coordinate</text>
<text x="185" y="282" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">tz-naive UTC datetime64[ns]</text>
<text x="185" y="300" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">canonical index for all datasets</text>

<!-- Storage: posix vars (teal) -->
<rect x="350" y="240" width="290" height="78" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="495" y="262" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">start_time / file_time</text>
<text x="495" y="282" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">float64 POSIX seconds</text>
<text x="495" y="300" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">same instant, stored as data var</text>

<text x="340" y="336" text-anchor="middle" font-size="12" fill="#5F5E5A">on-disk NetCDF storage contract — never changes</text>

<line x1="185" y1="318" x2="185" y2="380" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="495" y1="318" x2="495" y2="380" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Consumers (purple) -->
<rect x="40" y="382" width="600" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="404" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Consumers — read back through to_local()</text>
<text x="340" y="424" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">create_stats · create_modal · get_slice · post_processing — no ad-hoc tz code</text>
</svg>
