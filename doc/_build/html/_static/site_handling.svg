<svg width="680" height="440" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img">
<title>Site handling via callback registry</title>
<desc>A general engine on the left calls hooks from a central registry; a site adapter on the right registers Geyer-specific transforms, geometry, and policy into that registry. The engine never imports the site.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Engine column (teal) -->
<rect x="30" y="40" width="180" height="300" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="120" y="62" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">monitoring.py</text>
<text x="120" y="80" text-anchor="middle" font-size="12" fill="#0F6E56">general engine</text>
<rect x="46" y="100" width="148" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="120" y="122" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#04342C">file_info / stats</text>
<rect x="46" y="152" width="148" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="120" y="174" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#04342C">get_slice windowing</text>
<rect x="46" y="204" width="148" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="120" y="226" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#04342C">modal driver loop</text>
<rect x="46" y="256" width="148" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="120" y="278" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#04342C">save / merge db</text>
<text x="120" y="324" text-anchor="middle" font-size="12" fill="#0F6E56">no sensor names</text>

<!-- Registry column (purple) -->
<rect x="250" y="40" width="180" height="300" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="62" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">registry</text>
<text x="340" y="80" text-anchor="middle" font-size="12" fill="#534AB7">Site hooks by quantity</text>
<rect x="266" y="104" width="148" height="50" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="122" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#26215C">transform hook</text>
<text x="340" y="138" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#26215C">wind / strain</text>
<rect x="266" y="164" width="148" height="50" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="182" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#26215C">geometry hook</text>
<text x="340" y="198" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#26215C">chan_dofs / refs</text>
<rect x="266" y="224" width="148" height="50" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="242" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#26215C">error-rule hook</text>
<text x="340" y="258" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#26215C">ranges / kurtosis</text>
<rect x="266" y="284" width="148" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="306" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#26215C">sync-policy hook</text>

<!-- Site column (amber) -->
<rect x="470" y="40" width="180" height="300" rx="14" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="560" y="62" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">site_geyer.py</text>
<text x="560" y="80" text-anchor="middle" font-size="12" fill="#854F0B">+ config data</text>
<rect x="486" y="100" width="148" height="44" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text x="560" y="122" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#412402">wind_transform</text>
<rect x="486" y="152" width="148" height="44" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text x="560" y="174" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#412402">strain + FBG consts</text>
<rect x="486" y="204" width="148" height="44" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text x="560" y="226" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#412402">chan_dofs_dict</text>
<rect x="486" y="256" width="148" height="44" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text x="560" y="278" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#412402">sync eras 16/18/19</text>
<text x="560" y="324" text-anchor="middle" font-size="12" fill="#854F0B">imports the engine</text>

<!-- Connectors -->
<line x1="210" y1="180" x2="262" y2="180" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="236" y="172" text-anchor="middle" font-size="12" fill="#5F5E5A">calls</text>
<line x1="468" y1="200" x2="416" y2="200" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="442" y="192" text-anchor="middle" font-size="12" fill="#5F5E5A">registers</text>

<!-- daily.py footer (gray) -->
<rect x="30" y="360" width="620" height="56" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="382" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">daily.py — import site_geyer; site = get_site("geyer")</text>
<text x="340" y="402" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">site selected by name; a second structure is just another site_*.py</text>
</svg>
